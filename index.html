<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SGF.work | New Tab</title>
    <link rel="stylesheet" href="https://use.typekit.net/oii6upi.css?display=swap">

    <style>
        :root {
            --primary-color: #000000;
            --accent-color: #000000;
            --text-main: #1a1a1a;
            --text-muted: #666666;
            --bg-color: #f0f2f5;
            --glass-bg: rgba(255, 255, 255, 0.45);
            --glass-bg-hover: rgba(255, 255, 255, 0.6);
            --glass-border: rgba(255, 255, 255, 0.5);
            --glass-shadow: 0 8px 32px rgba(0, 0, 0, 0.06);
            --glass-blur: blur(16px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            font-family: "area", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.8) 0%, transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(200, 200, 200, 0.2) 0%, transparent 50%);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2.5rem 3rem;
            animation: fadeInDown 0.8s ease-out forwards;
            opacity: 0;
        }

        .brand-logo-link {
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .brand-logo-img {
            height: 45px;
            width: auto;
            display: block;
        }

        .wifi-card {
            background: var(--glass-bg);
            -webkit-backdrop-filter: var(--glass-blur);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: var(--glass-shadow);
            color: var(--text-muted);
            transition: background 0.3s ease, transform 0.3s ease;
        }

        .wifi-card:hover {
            background: var(--glass-bg-hover);
            transform: translateY(-2px);
        }

        .wifi-icon {
            display: flex;
            align-items: center;
            color: var(--primary-color);
        }

        .wifi-details {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .wifi-details strong {
            color: var(--text-main);
            font-family: "area-normal", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-weight: 900;
            letter-spacing: 0.02em;
        }

        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            animation: fadeIn 1s ease-out 0.2s forwards;
            opacity: 0;
        }

        .clock-container {
            margin-bottom: 2rem;
            position: relative;
        }

        .clock {
            font-family: "area-normal", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-weight: 900;
            font-size: clamp(6rem, 15vw, 12rem);
            line-height: 1;
            letter-spacing: -0.04em;
            color: var(--primary-color);
            font-variant-numeric: tabular-nums;
            text-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .date {
            font-size: clamp(1.2rem, 3vw, 1.8rem);
            color: var(--text-muted);
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            margin-top: 0.5rem;
        }

        .footer {
            padding: 2.5rem 3rem 3rem;
            display: flex;
            justify-content: center;
            animation: fadeInUp 0.8s ease-out 0.4s forwards;
            opacity: 0;
        }

        .quick-links {
            display: flex;
            gap: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        .quick-link {
            background: var(--glass-bg);
            -webkit-backdrop-filter: var(--glass-blur);
            backdrop-filter: var(--glass-blur);
            border: 1px solid var(--glass-border);
            padding: 1rem 1.5rem;
            border-radius: 16px;
            text-decoration: none;
            color: var(--text-main);
            font-family: "area-normal", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            font-weight: 900;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: var(--glass-shadow);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .quick-link:hover {
            background: var(--glass-bg-hover);
            transform: translateY(-4px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            color: var(--primary-color);
        }

        .quick-link svg {
            width: 18px;
            height: 18px;
            opacity: 0.8;
            transition: transform 0.3s ease;
        }

        .quick-link:hover svg {
            transform: scale(1.1);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                flex-direction: column;
                gap: 1.5rem;
                padding: 2rem;
            }
            .quick-links {
                gap: 1rem;
            }
            .quick-link {
                padding: 0.8rem 1.2rem;
                font-size: 0.75rem;
            }
            .footer {
                padding: 2rem;
            }
        }
    </style>
</head>
<body>

    <header class="header">
        <a href="/" class="brand-logo-link">
            <img src="https://sgf.work/.netlify/images?url=/logo.png&w=600" alt="SGF.work" class="brand-logo-img">
        </a>
        
        <div class="wifi-card" aria-label="WiFi Information">
            <div class="wifi-icon">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M5 12.55a11 11 0 0 1 14.08 0"></path>
                    <path d="M1.42 9a16 16 0 0 1 21.16 0"></path>
                    <path d="M8.53 16.11a6 6 0 0 1 6.95 0"></path>
                    <line x1="12" y1="20" x2="12.01" y2="20"></line>
                </svg>
            </div>
            <div class="wifi-details">
                <span>Network: <strong>SGF.work Fast</strong></span>
                <span>Password: <strong>BuildThe417</strong></span>
            </div>
        </div>
    </header>

    <main class="main-content">
        <div class="clock-container">
            <div class="clock" id="clock" aria-live="polite">12:00</div>
            <div class="date" id="date">Monday, January 1</div>
        </div>
    </main>

    <footer class="footer">
        <nav class="quick-links" aria-label="Quick Links">
            <a href="/resources" class="quick-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path>
                    <path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path>
                </svg>
                Member Resources
            </a>
            <a href="/events" class="quick-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="16" y1="2" x2="16" y2="6"></line>
                    <line x1="8" y1="2" x2="8" y2="6"></line>
                    <line x1="3" y1="10" x2="21" y2="10"></line>
                </svg>
                Events
            </a>
            <a href="https://sgf.co/cal-res" class="quick-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                    <line x1="9" y1="3" x2="9" y2="21"></line>
                </svg>
                Book a Room
            </a>
            <a href="mailto:hello@sgfcowork.com" class="quick-link">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
                    <polyline points="22,6 12,13 2,6"></polyline>
                </svg>
                Contact
            </a>
        </nav>
    </footer>

    <script>
        function updateTime() {
            const now = new Date();
            
            let hours = now.getHours();
            let minutes = now.getMinutes();
            
            // Format time
            hours = hours % 12;
            hours = hours ? hours : 12; // 0 becomes 12
            minutes = minutes < 10 ? '0' + minutes : minutes;
            
            // Update clock
            document.getElementById('clock').textContent = hours + ':' + minutes;
            
            // Update date
            const options = { weekday: 'long', month: 'long', day: 'numeric' };
            document.getElementById('date').textContent = now.toLocaleDateString('en-US', options);
        }

        // Initialize immediately
        updateTime();
        
        // Update every second
        setInterval(updateTime, 1000);
    </script>
</body>
</html>
